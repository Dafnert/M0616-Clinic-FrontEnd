<div class="dashboard-layout">

  <div class="col-left">
    <app-patient-profile [patientId]="patientId" [embedded]="true" />
  </div>

  <div class="col-right">

    <div class="odontograma-wrapper">
      <div class="section-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C8 2 5 5 5 9c0 2.5 1 4.5 2.5 6L9 22h6l1.5-7C18 13.5 19 11.5 19 9c0-4-3-7-7-7z"/>
        </svg>
        <h2 class="section-title">Odontograma</h2>
      </div>
      <div class="section-body">
        <app-odontograma />
      </div>
    </div>

    <div class="documents-wrapper">
      <div class="section-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <h2 class="section-title">Documentos</h2>
      </div>
      <div class="section-body">
        <app-documents [patientId]="patientId" />
      </div>
    </div>

  </div>

</div>
