<div class="form-page">

  <div class="form-wrapper">

    <div class="form-header">
      <div class="form-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <div class="form-header-info">
        <span class="form-title">Nou Pacient</span>
        <p class="form-subtitle">Emplena les dades per registrar el pacient</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="guardar()">

      <div class="form-section-title">Dades personals</div>

      <div class="form-row">
        <div class="field">
          <label>Nom</label>
          <input type="text" formControlName="name" placeholder="Nom" />
        </div>
        <div class="field">
          <label>Cognoms</label>
          <input type="text" formControlName="surname" placeholder="Cognoms" />
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Edat</label>
          <input type="number" formControlName="age" placeholder="Anys" />
        </div>
        <div class="field">
          <label>DNI</label>
          <input type="text" formControlName="dni" placeholder="DNI" />
        </div>
      </div>

      <hr class="form-divider" />
      <div class="form-section-title">Informació mèdica</div>

      <!-- VIH checkbox -->
      <div class="vih-toggle" [class.vih-actiu]="form.get('teneVih')?.value">
        <label class="vih-label">
          <input type="checkbox" formControlName="teneVih" />
          <span class="vih-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
          <span class="vih-text">Pacient amb VIH</span>
        </label>
        @if (form.get('teneVih')?.value) {
          <span class="vih-badge">⚠ VIH actiu</span>
        }
      </div>

      @if (!form.get('teneVih')?.value) {
        <div class="field">
          <label>Malaltia / Diagnòstic</label>
          <input type="text" formControlName="disease" placeholder="Opcional" />
        </div>
      }

      <div class="field">
        <label>Al·lèrgies</label>
        <input type="text" formControlName="alergias" placeholder="Penicil·lina, làtex... (opcional)" />
      </div>

      <div class="field">
        <label>Observacions</label>
        <input type="text" formControlName="observations" placeholder="Opcional" />
      </div>

      <hr class="form-divider" />
      <div class="form-section-title">Accés al sistema</div>

      <div class="form-row">
        <div class="field">
          <label>Usuari</label>
          <input type="text" formControlName="username" placeholder="Nom d'usuari" />
        </div>
        <div class="field">
          <label>Contrasenya</label>
          <input type="password" formControlName="password" placeholder="Contrasenya" />
        </div>
      </div>

      <hr class="form-divider" />
<div class="form-section-title">Consentiments</div>

<div class="consent-group">

  <label class="consent-label required">
    <input type="checkbox" formControlName="acceptedPrivacy" />
    Accepto la política de privacitat *
  </label>

  <label class="consent-label">
    <input type="checkbox" formControlName="acceptedAnesthesia" />
    Accepto el consentiment d’anestèsia
  </label>

</div>

      @if (error) {
        <p class="error-msg">{{ error }}</p>
      }

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancelar()">Cancel·lar</button>
        <button type="submit" class="btn-primary" [disabled]="form.invalid">Desar pacient</button>
      </div>

    </form>
  </div>
</div>
