<form (ngSubmit)="login()" #LoginForm="ngForm" method="post" id="Login">
  <div class="left">
    <div>
      <img src="/img/logo.png" />
    </div>

    @if (loginAttempts > 0) {
    <div class="attempts-badge">Intents fallits: {{ loginAttempts }}</div>
    }
  </div>

  <div class="right">
    <div>
      <h1>
Iniciar Sessió</h1>

      @switch (loginStatus) { @case ('loading') {
      <div class="status-message loading">
        <span class="spinner">⏳</span>
        Verificant credencials...
      </div>
      } @case ('success') {
      <div class="status-message success">
        {{ errorMessage }}
      </div>
      } @case ('error') {
      <div class="status-message error">
        {{ errorMessage }}
      </div>
      } }

      <input
        type="text"
        name="username"
        placeholder="Nom d'usuari"
        [(ngModel)]="username"
        [disabled]="isLoading"
      />
      <span class="material-symbols-outlined person"></span>

      <input
        type="password"
        name="password"
        placeholder="Contrasenya"
        [(ngModel)]="password"
        [disabled]="isLoading"
      />
      <span class="material-symbols-outlined lock"></span>

      <button type="submit" [disabled]="isLoading || loginAttempts >= errorMessages.length">
        @if (isLoading) { Verificant... } @else { Iniciar Sessió }
      </button>

      <!-- Register button -->
      <button type="button" 
      class="register-btn" 
      (click)="goToRegister()">
       Registrarse </button>
    </div>
  </div>
</form>
