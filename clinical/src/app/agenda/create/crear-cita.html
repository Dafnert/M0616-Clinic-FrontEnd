<div class="form-wrapper">
  <div class="form-header">
    <span class="form-title">{{ titulo }}</span>
    <p class="form-subtitle">Emplena les dades per a registrar la cita</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="form-row">
      <div class="field">
        <label>Data</label>
        <input type="date" formControlName="date" />
      </div>
      <div class="field">
        <label>Hora</label>
        <input type="time" formControlName="hourVisit" />
      </div>
    </div>

    <div class="field">
      <label>Doctor</label>
      <select formControlName="doctorId">
        <option value="">-- Selecciona un doctor --</option>
        <option *ngFor="let doctor of doctors" [value]="doctor.id">
          {{ doctor.name }} {{ doctor.surname }} — {{ doctor.speciality }}
        </option>
      </select>
    </div>

    <div class="field">
      <label>Motiu de consulta</label>
      <input type="text" placeholder="Ej. Revisión anual, dolor molar..." formControlName="reason" />
    </div>

    <div class="field">
      <label>Observacions</label>
      <textarea placeholder="Notas adicionales para el profesional..."
                rows="3"
                formControlName="observations">
      </textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary">Cancel·lar</button>
      <button type="submit" class="btn-primary">Desar cita</button>
    </div>
  </form>
</div>
